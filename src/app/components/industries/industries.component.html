<section class="  py-10">
    <div class="container-custom text-center">
        <h1 class="text-4xl md:text-6xl font-bold text-white mb-6">Industries We Serve</h1>
        <p class="text-indigo-200 text-xl max-w-2xl mx-auto">Tailored communication strategies for every sector.</p>
    </div>
</section>

<section class="section-padding bg-white p-8">
    <div class="container-custom">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            @for (industry of industries; track industry.name) {
            <div class="p-8 rounded-2xl border border-slate-100 hover:shadow-xl transition-all group">
                <div class="w-14 h-14 bg-sky-50 primary-blue rounded-xl flex items-center justify-center mb-6 group-hover:bg-[var(--primary-blue)]  group-hover:text-white transition-colors">
                    <mat-icon fontSet="material-symbols-outlined">{{industry?.icon}}</mat-icon>
                </div>
                <h3 class="text-xl font-bold text-slate-900 mb-4">{{ industry.name }}</h3>
                <p class="text-slate-500 text-sm leading-relaxed">
                    Providing specialized {{ industry.name.toLowerCase() }} solutions to enhance engagement and streamline operations.
                </p>
            </div>
            }
        </div>
    </div>
</section>
